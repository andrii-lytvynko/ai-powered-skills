name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - name: Set up Artifactory credentials
        run: |
          echo "@zendesk:registry=https://zdrepo.jfrog.io/zdrepo/api/npm/npm/" >> ~/.npmrc
          echo "@zendesk-ui:registry=https://zdrepo.jfrog.io/zdrepo/api/npm/npm/" >> ~/.npmrc
          echo "//zdrepo.jfrog.io/zdrepo/api/npm/npm/:always-auth=true" >> ~/.npmrc
          echo "//zdrepo.jfrog.io/zdrepo/api/npm/npm/:username=andrii.lytvynko" >> ~/.npmrc
          echo "//zdrepo.jfrog.io/zdrepo/api/npm/npm/:email=andrii.lytvynko@zendesk.com" >> ~/.npmrc
          echo "//zdrepo.jfrog.io/zdrepo/api/npm/npm/:_password=${{ secrets.ARTIFACTORY_AUTH_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
